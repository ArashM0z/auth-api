name: docs

# Builds the MkDocs Material site and publishes it to GitHub Pages
# (served from the gh-pages branch). Runs on any docs change to main.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# gh-deploy pushes the built site to the gh-pages branch, so it needs write.
permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gh-deploy needs history to update gh-pages
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install "mkdocs-material>=9.5"
      - run: mkdocs gh-deploy --force --no-history
