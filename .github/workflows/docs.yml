name: docs

# Publishes the combined GitHub Pages site:
#   /            → the landing app (web/: Vite + React + TypeScript — the
#                  architecture tour, API reference, playground, and
#                  rate-limiter demo, typed against the generated OpenAPI client)
#   /docs/       → the arc42 architecture handbook (MkDocs Material)
# Runs on any change to either source on main.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'web/**'
      - 'mkdocs.yml'
      - 'openapi.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Deploy pushes the assembled site to the gh-pages branch.
permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy landing + handbook
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build the landing app (typecheck + vite)
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build # tsc --noEmit && vite build → ../pages-dist/

      - name: Build the MkDocs handbook
        run: mkdocs build # → site/

      - name: Assemble combined site (landing at /, handbook at /docs/)
        run: |
          rm -rf out
          mkdir out
          cp -r pages-dist/. out/
          # The repo-root openapi.json is the source of truth (regenerated by
          # CI's drift gate); overlay it so the deployed reference and
          # playground always match the committed contract.
          cp -f openapi.json out/openapi.json
          cp -r site out/docs
          touch out/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          force_orphan: true
