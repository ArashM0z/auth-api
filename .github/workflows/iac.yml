# Static checks for infra/ — this IaC is never applied in CI (zero-cost
# take-home), so the pipeline proves formatting, validity, lint cleanliness,
# and security posture instead of running a plan against real credentials.
name: IaC

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/iac.yml'
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/iac.yml'

# Read-only for the repo; security-events write lets Checkov publish SARIF
# to the Security tab. No cloud credentials are needed anywhere here.
permissions:
  contents: read
  security-events: write

concurrency:
  group: iac-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  iac:
    name: fmt / validate / test / tflint / checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v2

      - name: Check formatting
        run: tofu -chdir=infra fmt -check -recursive

      # -backend=false: resolve providers/modules without touching state —
      # validation needs no backend and CI must not hold one.
      - name: Init (no backend)
        run: tofu -chdir=infra init -backend=false

      - name: Validate
        run: tofu -chdir=infra validate

      # Native `tofu test`: security- and multi-environment assertions run
      # against mock providers (command = plan), so this needs NO AWS
      # credentials and creates nothing. Providers were installed by the
      # `init -backend=false` step above.
      - name: Test
        run: tofu -chdir=infra test

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.63.1

      - name: Init TFLint
        run: tflint --init
        working-directory: infra
        env:
          # Authenticated ruleset download avoids GitHub API rate limits.
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --format compact
        working-directory: infra

      # soft_fail stays false: findings fail the build. The deliberate demo
      # trade-offs (no NAT, HTTP listener, AWS-managed KMS keys, 30-day
      # logs) are suppressed inline in the HCL with justifications, so any
      # NEW finding is a real regression.
      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          quiet: true
          soft_fail: false
          output_format: cli,sarif
          output_file_path: console,checkov-tf.sarif

      # Publish findings to the Security tab even when the step above fails
      # the build, so regressions are visible, not just red.
      - name: Upload Checkov results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-tf.sarif
          category: checkov-terraform
