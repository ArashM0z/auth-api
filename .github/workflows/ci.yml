name: CI

# Run the full suite on every push (any branch) and every PR, plus on
# demand — fast feedback wherever you work, not only on main.
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on branches/PRs; never cancel a run on main.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    name: Lint, typecheck & API contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # The committed OpenAPI document is generated from route schemas;
      # regenerate and fail on drift so the contract can never lie.
      - run: npm run openapi:generate
      - run: git diff --exit-code openapi.json
      - run: npm run openapi:lint

  test:
    name: Tests (unit + property + integration vs real Redis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Testcontainers spins up redis:8-alpine using the runner's Docker —
      # the identical suite runs on a laptop and in CI.
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 14

  mutation:
    name: Mutation testing (test quality)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Stryker mutates the core domain logic and fails if the unit suite
      # doesn't kill enough mutants — coverage measures lines run, this
      # measures whether the assertions actually catch regressions.
      - run: npm run test:mutation
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  docker:
    name: Production image builds & runs as non-root
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build --target prod -t auth-api:ci .
      - name: Image must not run as root
        run: |
          uid="$(docker run --rm --entrypoint node auth-api:ci -e 'console.log(process.getuid())')"
          test "$uid" = "1000"

  landing:
    name: Landing app (typecheck & build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      # The React + TypeScript landing (web/) is typed against the generated
      # OpenAPI client, so a contract change that breaks the UI fails here.
      - working-directory: web
        run: npm ci --no-audit --no-fund
      - working-directory: web
        run: npm run build # tsc --noEmit && vite build
