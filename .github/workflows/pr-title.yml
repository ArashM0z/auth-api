name: PR title

# Enforce Conventional Commits on PR titles so squash-merges land a clean,
# machine-readable history on main. Self-contained (no third-party action).
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: pr-title-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conventional-title:
    name: Conventional Commits title
    runs-on: ubuntu-latest
    steps:
      - name: Validate the PR title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $TITLE"
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9 ._/-]+\))?!?: .+'
          if ! printf '%s' "$TITLE" | grep -Eq "$pattern"; then
            echo "::error::PR title must follow Conventional Commits, e.g. 'feat(auth): add refresh tokens' or 'fix(rate-limit): correct TTL'."
            exit 1
          fi
          echo "OK — title is a valid Conventional Commit."
